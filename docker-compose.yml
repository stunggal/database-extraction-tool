services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: database-extraction-tool-app
    working_dir: /var/www/html
    depends_on:
      - db
    ports:
      - "3000:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_URL: http://localhost:3000
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel

  db:
    image: mysql:8.0
    container_name: database-extraction-tool-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

volumes:
  mysql_data: